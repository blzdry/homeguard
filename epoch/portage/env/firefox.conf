CC="clang"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"

COMMON_FLAGS="-march=native -O3 -pipe -flto=thin -fno-sized-deallocation -fno-aligned-new -fno-strict-aliasing -fPIC -fno-exceptions -fno-rtti -fno-math-errno -fomit-frame-pointer -funwind-tables -fdata-sections"

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"

RUSTFLAGS="-C target-cpu=native -C opt-level=3 -Clinker=clang -Clinker-plugin-lto -Clink-arg=-fuse-ld=lld"
LDFLAGS="-Wl, -O2 -Wl,--as-needed -fuse-ld=lld"
